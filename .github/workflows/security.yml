name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks-action@v2 scans the PR-vs-base diff on pull_request events
          # and the latest commit on push events. fetch-depth: 0 gives it the
          # full history it needs in both cases without an extra fetch step.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          # Required by gitleaks-action@v2 for pull_request scans. Without
          # this the action fails with: "GITHUB_TOKEN is now required to
          # scan pull requests." Using the workflow's auto-issued token
          # keeps the scope minimal (read-only via the top-level
          # `permissions: contents: read` declaration above).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/default
