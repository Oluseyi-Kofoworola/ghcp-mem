name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Default to least privilege; the release job overrides with `contents: write`.
permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Required by the strict release-consistency gate below, which
          # resolves `origin/main` to verify HEAD is pushed. The default
          # shallow checkout doesn't carry that ref on a tag build, so
          # the gate fails before lint/test/bundle can run.
          fetch-depth: 0

      - name: Make origin/main resolvable for the strict release gate
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release-consistency gate (doc-only on PRs, strict on tags)
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npm run check:release:strict
          else
            npm run check:release
          fi
        shell: bash

      - name: Format check (Prettier)
        # Closes the auditability gap from the v1.6.1 review: the README claimed
        # "CI-enforced" Prettier but no CI step actually ran it. New files were
        # landing unformatted (4 of them by v1.7.0) and the claim went stale.
        # This gate fails the build if any source/script file isn't Prettier-clean.
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Eval regression gate
        run: npm run eval:check

      - name: Search-latency benchmark (smoke)
        run: npm run bench
        env:
          # Lower the bench sizes in CI to keep wall-time bounded.
          BENCH_SESSIONS: 500
          BENCH_QUERIES: 100

      - name: Bundle (production esbuild)
        run: npm run bundle:prod

      - name: Package vsix
        run: npx --yes @vscode/vsce package --out ghcp-mem.vsix --no-dependencies

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghcp-mem-${{ matrix.os }}.vsix
          path: ghcp-mem.vsix
          retention-days: 14

  release:
    name: Attach vsix to GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ghcp-mem-ubuntu-latest.vsix
          path: ./dist
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: ./dist/ghcp-mem.vsix
          generate_release_notes: true
